<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>LexiGraph | Radix Trie Visualization</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#0058be",
                        "primary-container": "#2170e4",
                        "on-primary": "#ffffff",
                        "on-surface": "#191c1e",
                        "on-surface-variant": "#424754",
                        "surface": "#f7f9fb",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-highest": "#e0e3e5",
                        "outline": "#727785",
                        "tertiary": "#825100",
                        "tertiary-container": "#a36700",
                        "on-tertiary": "#ffffff"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                }
            }
        }
    </script>
    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .blueprint-grid {
            background-image: radial-gradient(#c2c6d6 0.5px, transparent 0.5px);
            background-size: 24px 24px;
        }
        /* Style cho D3.js Graph */
        .link { fill: none; stroke: #727785; stroke-width: 2px; opacity: 0.5; }
        .node circle { stroke: #0058be; stroke-width: 2px; fill: #ffffff; cursor: pointer; transition: all 0.3s;}
        .node circle.is-word { fill: #0058be; stroke: #004395; stroke-width: 3px; }
        .node circle.is-deleted { fill: #f8d7da; stroke: #dc3545; stroke-dasharray: 4; } 
        .node text { font-family: 'Manrope', sans-serif; font-weight: 700; font-size: 14px; fill: #191c1e; pointer-events: none;}
        .edge-label { font-family: 'Inter', monospace; font-size: 12px; font-weight: 600; fill: #0058be; background: white;}
    </style>
</head>
<body class="bg-background text-on-surface font-body antialiased overflow-hidden">
    <header class="bg-slate-50 flex justify-between items-center px-6 py-3 w-full border-b z-50">
        <span class="text-2xl font-bold text-blue-800">LexiGraph</span>
    </header>

    <main class="flex h-[calc(100vh-60px)] w-full overflow-hidden">
        <aside class="w-full md:w-[400px] bg-surface-container-low flex flex-col h-full border-r relative shadow-lg z-20">
            <div class="p-8 flex flex-col gap-6 h-full">
                
                <div class="space-y-4">
                    <label class="font-headline text-[10px] uppercase tracking-[0.2em] text-on-surface-variant font-bold block">Word Inquiry</label>
                    <div class="relative bg-surface-container-highest rounded-md">
                        <input id="wordInput" class="w-full bg-transparent border-none focus:ring-0 py-3 pl-4 pr-10 text-on-surface" placeholder="Word (e.g., apple)" type="text"/>
                    </div>
                    <div class="relative bg-surface-container-highest rounded-md">
                        <input id="meaningInput" class="w-full bg-transparent border-none focus:ring-0 py-3 pl-4 pr-10 text-on-surface" placeholder="Meaning (e.g., Quả táo)" type="text"/>
                    </div>
                </div>

                <div class="flex gap-3">
                    <button onclick="addWord()" class="flex-1 bg-primary text-on-primary py-3 rounded-full font-label text-sm font-bold flex items-center justify-center gap-2 hover:brightness-110">
                        <span class="material-symbols-outlined">add</span> New Entry
                    </button>
                    <button onclick="searchWord()" class="flex-1 bg-surface-container-highest text-on-surface py-3 rounded-full font-label text-sm font-bold flex items-center justify-center gap-2 hover:bg-slate-300">
                        <span class="material-symbols-outlined">search</span> Search
                    </button>
                    <button onclick="deleteWord()" class="p-3 bg-surface-container-highest text-tertiary rounded-full hover:bg-tertiary-container hover:text-on-tertiary transition-all">
                        <span class="material-symbols-outlined">delete</span>
                    </button>
                </div>

                <div class="flex-grow mt-4">
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-outline/20 relative h-full">
                        <div class="absolute top-0 left-0 w-1 h-full bg-primary-container"></div>
                        <h1 id="resultWord" class="font-headline text-3xl font-extrabold text-on-surface">...</h1>
                        <p id="resultStatus" class="text-primary font-label text-xs uppercase font-bold mt-1">Ready</p>
                        <p id="resultMeaning" class="text-on-surface-variant mt-4 text-sm leading-relaxed">
                            Nhập từ và nhấn Tìm kiếm hoặc Thêm từ để hệ thống Radix Trie hoạt động.
                        </p>
                    </div>
                </div>
            </div>
        </aside>

        <section class="flex-grow bg-surface blueprint-grid relative flex items-center justify-center overflow-auto p-4">
            <div id="tree-container" class="w-full h-full relative z-10"></div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
